server:
  port: 8086

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mdt}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none           # ext 模块无自有表，不建表
    open-in-view: false

lb:
  strategy: ROUND_ROBIN
  backends: http://localhost:8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

grpc:
  server:
    port: 50058    # ext gRPC 端口（与其他服务不冲突）
